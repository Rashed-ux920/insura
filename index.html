                <form action="/index.html" method="get">
                    <div class="f-box">
                        <label for="name">
                            Name
                            <input type="text" name="name" id="name" required autocomplete="">
                        </label>
                        <label for="email">
                            Email
                            <input type="email" type="email" id="email" required autocomplete="">
                        </label>
                    </div>
                    <div class="f-box">
                        <label for="phone">
                            Phone
                            <input type="tel" name="phone" id="phone" required autocomplete="">
                        </label>
                        <label for="Zipcode">
                            Zipcode
                            <input type="number" name="Zipcode" id="Zipcode" required autocomplete="">
                        </label>
                    </div>
                    <div class="f-box">
                        <label for="message">
                            Message
                            <textarea name="message" id="message" cols="48" rows="10" autocomplete=""></textarea>
                        </label>
                    </div>
                    <div class="alignment">
                        <button type="submit" class="btn-send">Send</button>
                    </div>
                    
                </form>
